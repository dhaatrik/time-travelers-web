<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Time Traveler's Web — an interactive journey through the internet's most iconic eras, from 1985 to 2005.">
  <meta name="author" content="Dhaatrik Chowdhury">
  <title>Time Traveler's Web</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Comic+Neue:wght@400;700&family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
  <style>
    body {
      transition: background-color 0.7s ease-in-out, color 0.7s ease-in-out, background-image 0.7s ease-in-out;
    }
    .reduce-motion-enabled body, .reduce-motion-enabled * {
      animation-duration: 0.01ms !important;
      animation-iteration-count: 1 !important;
      transition-duration: 0.01ms !important;
      scroll-behavior: auto !important;
    }

    /* Custom animation for marquee */
    @keyframes marquee {
      0%   { transform: translateX(100%); }
      100% { transform: translateX(-100%); }
    }
    body:not(.reduce-motion-enabled) .animate-marquee {
      animation: marquee 15s linear infinite;
    }

    /* Custom animation for blinking text */
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }
    body:not(.reduce-motion-enabled) .animate-blink-custom {
      animation: blink 1s linear infinite;
    }
     body:not(.reduce-motion-enabled) .animate-pulse {
      animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: .5; }
    }


    /* Enhanced CRT Effect */
    body:not(.reduce-motion-enabled) .crt-effect::before {
        content: " ";
        display: block;
        position: fixed; /* Use fixed to cover viewport */
        top: 0;
        left: 0;
        bottom: 0;
        right: 0;
        background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.15) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.04), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.04));
        z-index: 10000; /* High z-index to be on top */
        background-size: 100% 2px, 3px 100%;
        pointer-events: none; /* Allow clicks through */
        animation: crt-flicker 0.15s infinite;
        opacity: 0.7; /* Initial opacity */
    }
    body:not(.reduce-motion-enabled) .crt-effect::after {
        content: " ";
        display: block;
        position: fixed;
        top: 0;
        left: 0;
        bottom: 0;
        right: 0;
        background: linear-gradient(transparent 0%, rgba(0,0,0,0.05) 5%, transparent 10%);
        animation: hum-bar 1.5s linear infinite; /* Slower animation for hum bar */
        z-index: 10001; /* Above scanlines */
        pointer-events: none;
        opacity: 0.3;
    }

    @keyframes crt-flicker {
      0% { opacity: 0.45; } 5% { opacity: 0.5; } 10% { opacity: 0.35; } 15% { opacity: 0.6; }
      20% { opacity: 0.4; } 25% { opacity: 0.55; } 30% { opacity: 0.3; } 35% { opacity: 0.65; }
      40% { opacity: 0.38; } 45% { opacity: 0.52; } 50% { opacity: 0.42; } 55% { opacity: 0.6; }
      60% { opacity: 0.32; } 65% { opacity: 0.58; } 70% { opacity: 0.4; } 75% { opacity: 0.62; }
      80% { opacity: 0.34; } 85% { opacity: 0.5; } 90% { opacity: 0.48; } 95% { opacity: 0.65; }
      100% { opacity: 0.4; }
    }
    @keyframes hum-bar {
        0% { transform: translateY(-10%); }
        100% { transform: translateY(110%); }
    }

    .font-pixel-vt323 { font-family: 'VT323', monospace; }
    .font-pixel-press-start { font-family: '"Press Start 2P"', cursive; }
    .font-comic-like { font-family: 'Comic Neue', "Comic Sans MS", "Chalkboard SE", cursive; }

    /* Blinking block cursor for inputs */
    .blinking-block-cursor {
      caret-color: transparent; /* Hide native caret */
    }
    body:not(.reduce-motion-enabled) .blinking-block-cursor::after {
      content: '_';
      display: inline-block;
      animation: blink 1s infinite steps(1, start);
      margin-left: -0.1em; /* Adjust position */
      font-weight: bold;
    }
    .blinking-block-cursor-green::after { color: #34d399; /* green-400 */ }

    /* Transition Overlay Effects */
    .transition-static-overlay { /* Renamed for clarity */
      position: fixed;
      top: 0; left: 0; width: 100vw; height: 100vh;
      background-image: repeating-linear-gradient(0deg, #333, #333 1px, transparent 1px, transparent 2px);
      opacity: 0.3;
      z-index: 9000;
    }
    body:not(.reduce-motion-enabled) .transition-static-overlay {
        animation: static-flicker 0.1s infinite;
    }
    @keyframes static-flicker {
      0%, 100% { opacity: 0.1; }
      50% { opacity: 0.2; }
    }
    body:not(.reduce-motion-enabled) .transition-fade-overlay {
      animation: fade-in-out 1.5s ease-in-out;
    }
    @keyframes fade-in-out {
      0% { opacity: 0; }
      25% { opacity: 1; }
      75% { opacity: 1; }
      100% { opacity: 0; }
    }
    .transition-glitch-overlay { /* Renamed for clarity */
      position: fixed;
      top: 0; left: 0; width: 100vw; height: 100vh;
      z-index: 9000;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .transition-glitch-overlay span { /* Style for the text itself */
        position: relative; /* Needed for z-index if stacking text */
    }
    body:not(.reduce-motion-enabled) .transition-glitch-overlay::before,
    body:not(.reduce-motion-enabled) .transition-glitch-overlay::after {
      content: attr(data-text);
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      background: inherit; /* Match body background for text color context */
      color: inherit; /* Match body text color */
      overflow: hidden;
      clip: rect(0, 900px, 0, 0);
      display: flex;
      align-items: center;
      justify-content: center;
      font: inherit; /* Ensure font is inherited by pseudo-elements */
    }
    body:not(.reduce-motion-enabled) .transition-glitch-overlay::before {
      left: 2px;
      text-shadow: -1px 0 red;
      animation: glitch-anim-1 2s infinite linear alternate-reverse;
    }
    body:not(.reduce-motion-enabled) .transition-glitch-overlay::after {
      left: -2px;
      text-shadow: -1px 0 blue;
      animation: glitch-anim-2 2s infinite linear alternate-reverse;
    }
    @keyframes glitch-anim-1 {
      0% { clip: rect(42px, 9999px, 44px, 0); transform: skewX(2deg); } 10% { clip: rect(12px, 9999px, 60px, 0); transform: skewX(-2deg); }
      20% { clip: rect(30px, 9999px, 70px, 0); transform: skewX(1deg); } 30% { clip: rect(5px, 9999px, 35px, 0); transform: skewX(-1deg); }
      40% { clip: rect(22px, 9999px, 100px, 0); transform: skewX(3deg); } 50% { clip: rect(80px, 9999px, 120px, 0); transform: skewX(-3deg); }
      60% { clip: rect(10px, 9999px, 50px, 0); transform: skewX(0.5deg); } 70% { clip: rect(60px, 9999px, 90px, 0); transform: skewX(-0.5deg); }
      80% { clip: rect(45px, 9999px, 65px, 0); transform: skewX(1.5deg); } 90% { clip: rect(5px, 9999px, 40px, 0); transform: skewX(-1.5deg); }
      100% { clip: rect(50px, 9999px, 140px, 0); transform: skewX(0deg); }
    }
    @keyframes glitch-anim-2 {
      0% { clip: rect(65px, 9999px, 119px, 0); transform: skewX(-2.5deg); } 10% { clip: rect(40px, 9999px, 130px, 0); transform: skewX(2.5deg); }
      20% { clip: rect(15px, 9999px, 80px, 0); transform: skewX(-1.5deg); } 30% { clip: rect(70px, 9999px, 95px, 0); transform: skewX(1.5deg); }
      40% { clip: rect(33px, 9999px, 55px, 0); transform: skewX(-3.5deg); } 50% { clip: rect(90px, 9999px, 125px, 0); transform: skewX(3.5deg); }
      60% { clip: rect(20px, 9999px, 75px, 0); transform: skewX(-0.8deg); } 70% { clip: rect(50px, 9999px, 105px, 0); transform: skewX(0.8deg); }
      80% { clip: rect(55px, 9999px, 85px, 0); transform: skewX(-1.8deg); } 90% { clip: rect(15px, 9999px, 60px, 0); transform: skewX(1.8deg); }
      100% { clip: rect(25px, 9999px, 70px, 0); transform: skewX(0deg); }
    }


    /* Sparkly Text Effect */
    body:not(.reduce-motion-enabled) .sparkly-text {
      animation: sparkly-frames 1.5s infinite;
      text-shadow: 0 0 5px #fff, 0 0 10px #fff, 0 0 15px #fff, 0 0 20px #ff00de, 0 0 35px #ff00de, 0 0 40px #ff00de, 0 0 50px #ff00de, 0 0 75px #ff00de;
    }
    @keyframes sparkly-frames{
      0%,100%{ text-shadow: 0 0 5px #fff,0 0 3px #fff,0 0 5px #fff,0 0 5px #ff00de,0 0 15px #ff00de,0 0 20px #ff00de,0 0 25px #ff00de,0 0 35px #ff00de; }
      50%{ text-shadow: 0 0 10px #fff,0 0 5px #fff,0 0 10px #fff,0 0 10px #ff00de,0 0 25px #ff00de,0 0 30px #ff00de,0 0 40px #ff00de,0 0 50px #ff00de; }
    }

    /* Glitter Text Effect */
    body:not(.reduce-motion-enabled) .glitter-text {
      background: linear-gradient(to right, #f8b739, #f87839, #c42c90, #7039b0, #f8b739);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      animation: glitter-animation 5s linear infinite;
      background-size: 500% auto;
    }
    @keyframes glitter-animation{
      0% { background-position: 0% center; }
      100% { background-position: 500% center; }
    }

    /* Matrix Effect */
    .matrix-overlay {
        position: fixed;
        top: 0; left: 0; width: 100%; height: 100%;
        background: #000;
        z-index: 10000;
        overflow: hidden;
    }
    .matrix-overlay canvas {
        display: block;
    }
    .matrix-message {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: #0F0;
      font-family: 'VT323', monospace;
      font-size: 2rem;
      text-align: center;
      z-index: 10001;
      padding: 20px;
      background: rgba(0,0,0,0.7);
      border: 2px solid #0F0;
    }

    /* Simple color input styling */
    .simple-color-input {
      -webkit-appearance: none;
      -moz-appearance: none;
      appearance: none;
      width: 40px;
      height: 40px;
      background-color: transparent;
      border: 2px solid currentColor; /* Use theme's text color for border */
      border-radius: 4px;
      cursor: pointer;
    }
    .simple-color-input::-webkit-color-swatch {
      border-radius: 2px;
      border: none;
    }
    .simple-color-input::-moz-color-swatch {
      border-radius: 2px;
      border: none;
    }

  </style>
</head>
<body>
  <div id="root"></div>
  <noscript>
    <div style="background-color: black; color: #00FF00; font-family: monospace; padding: 20px; text-align: center; height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center;">
      <h1>JavaScript is Required</h1>
      <p>This site is a highly interactive experience that relies heavily on JavaScript to travel through time.</p>
      <p>Please enable JavaScript in your browser settings to continue your journey through the web's past.</p>
      <p>If you're seeing this, you're already in 1985 mode... kind of!</p>
    </div>
  </noscript>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
